backend:
  name: git-gateway
  branch: main

media_folder: "public/images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "📝 وبلاگ"
    folder: "fa/blog/_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "تاریخ انتشار", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "عنوان پست", name: "title", widget: "string" }
      - { label: "خلاصه (برای لیست)", name: "excerpt", widget: "text", required: false }
      - { label: "تگ‌ها", name: "tags", widget: "list", default: ["عمومی"], required: false }
      - { label: "تصویر شاخص", name: "image", widget: "image", required: false }
      - { label: "محتوای اصلی", name: "body", widget: "markdown" }

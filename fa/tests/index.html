<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="theme-color" content="#0b0b0f">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>موزیک‌ها | GoldenJDM</title>
  <meta name="description" content="مجموعه موزیک‌های GoldenJDM - پروندهٔ شخصی امیرحسین زرنیان">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="GoldenJDM" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="alternate" hreflang="en" href="https://goldenjdm.ir/en/musics/" />
  <link rel="alternate" hreflang="fa" href="https://goldenjdm.ir/fa/musics/" />
  <link rel="canonical" href="https://goldenjdm.ir/fa/musics/" />
  <meta property="og:title" content="موزیک‌ها | GoldenJDM">
  <meta property="og:description" content="مجموعه موزیک‌های GoldenJDM">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://goldenjdm.ir/fa/musics/">
  
  <style>
    :root{
      --bg: #0b0b0f;
      --fg: #e9e9ef;
      --muted:#a7a7b3;
      --card: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.12);
      --max: 1080px;
      --radius: 24px;
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --grad1: conic-gradient(from 180deg at 50% 50%, #6ee7ff, #a78bfa, #f472b6, #6ee7ff);
      --glass-bg: rgba(20, 10, 35, 0.35);
      --glass-border: rgba(255, 255, 255, 0.15);
      --glass-border-hover: rgba(240, 171, 252, 0.45);
      --glass-blur: blur(40px) saturate(200%) brightness(1.08);
      --glass-shadow-inset: inset 0 1px 0 rgba(255,255,255,0.15), inset 0 -1px 0 rgba(0,0,0,0.20);
      --glass-shadow-outer: 0 8px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
      --glass-highlight: radial-gradient(120% 80% at 50% -20%, rgba(255,255,255,.12), transparent 60%);
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth;overflow-x:hidden}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Vazirmatn",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--fg);
      background:
        radial-gradient(1200px 800px at 80% -10%, #3b82f610 30%, transparent 60%) no-repeat,
        radial-gradient(1000px 700px at -10% 10%, #f472b610 30%, transparent 60%) no-repeat,
        var(--bg);
      padding-top:64px;
      overflow-x:hidden;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    a{color:inherit;text-decoration:none}
    .wrap{width:min(100%, var(--max)); margin-inline:auto; padding-inline:clamp(16px,4vw,32px)}

    nav{
      position:fixed;top:0;left:0;right:0;z-index:50;
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow-inset), var(--glass-shadow-outer);
      transition: background .3s ease, box-shadow .3s ease;
    }
    nav.scrolled {
      background: rgba(20, 10, 35, 0.55);
      box-shadow: var(--glass-shadow-inset), 0 4px 60px rgba(0,0,0,0.5);
    }
    .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;}
    .brand{font-weight:800;display:flex;align-items:center;gap:8px;}
    .brand img{width:48px;height:48px;border-radius:50%;object-fit:cover;transition:transform .2s ease;}
    .brand img:hover{transform:scale(1.05)}

    .hamburger{display:none;flex-direction:column;cursor:pointer;background:none;border:none;padding:8px;z-index:60;min-width:44px;min-height:44px;align-items:center;justify-content:center;}
    .hamburger span{width:24px;height:3px;background-color:var(--fg);margin:3px 0;border-radius:3px;transition:0.3s;display:block;}
    .hamburger.active span:nth-child(1){transform:rotate(-45deg) translate(-5px,6px);}
    .hamburger.active span:nth-child(2){opacity:0;}
    .hamburger.active span:nth-child(3){transform:rotate(45deg) translate(-5px,-6px);}
    
    .links{display:flex;gap:18px;font-weight:600;}
    .links a{opacity:.9;transition:opacity .2s,color .2s;}
    .links a:hover{opacity:1;color:#f0abfc;}
    .links a:focus{outline:2px solid rgba(168,85,247,0.7);outline-offset:4px}

    @media (max-width:768px){
      .hamburger{display:flex;}
      .links{
        position:fixed;left:0;top:64px;flex-direction:column;
        background:rgba(20,10,35,.98);backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border);
        width:100%;text-align:center;transition:transform .3s ease;padding:2rem 0;gap:0;z-index:45;
        transform:translateX(-100%);visibility:hidden;overflow:hidden;
      }
      .links.active{transform:translateX(0);visibility:visible;}
      .links a{display:block;padding:1.2rem 0;border-bottom:1px solid var(--border);font-size:1.1rem;}
      .links a:last-child{border-bottom:none;}
    }

    /* === MAIN PLAYER LAYOUT === */
    main{padding-block:clamp(48px,10vh,96px); flex: 1; display: flex; flex-direction: column; align-items: center; }
    h1{text-align:center;font-size:clamp(26px,5vw,38px);margin-bottom:32px;}
    .grad-hero{background: var(--grad1);-webkit-background-clip: text;background-clip: text;color: transparent;}

    .player-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      width: 100%;
      max-width: 500px;
    }

    /* === MUSIC PLAYER - EXACT STRUCTURE === */
    .music-player {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow-inset), var(--glass-shadow-outer);
      padding: 24px;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
      background-image: var(--glass-highlight);
      background-size: 200% 200%;
      background-position: 0 0;
      transition: all 0.35s cubic-bezier(.25,.46,.45,.94);
    }

    .music-player:hover {
      transform: translateY(-4px);
      border-color: var(--glass-border-hover);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 20px 60px rgba(140,60,220,.35), 0 0 0 1px rgba(240,171,252,.15);
      background-position: 100% 100%;
    }

    .music-player::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, transparent 30%, rgba(240,171,252,.3) 50%, transparent 70%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .music-player:hover::after { opacity: 1; }

    /* Album Artwork */
    .player-artwork {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      max-width: 280px;
      margin: 0 auto 20px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.1);
    }

    .artwork-glow {
      position: absolute;
      inset: -30px;
      background: radial-gradient(ellipse at center, rgba(168,85,247,.25) 0%, transparent 70%);
      animation: pulse 4s ease-in-out infinite;
      pointer-events: none;
      z-index: 1;
    }

    .artwork-image {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
      position: relative;
      z-index: 2;
    }

    .music-player:hover .artwork-image { transform: scale(1.04); }

    .vinyl-spin {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 3;
      pointer-events: none;
    }

    .music-player:hover .vinyl-spin { opacity: 1; }

    .vinyl-spin::before {
      content: '';
      width: 92%; height: 92%;
      border-radius: 50%;
      border: 2px dashed rgba(240,171,252,.35);
      animation: spin 20s linear infinite;
    }

    .vinyl-center {
      position: absolute;
      width: 22%; height: 22%;
      background: rgba(20,10,35,.9);
      border-radius: 50%;
      border: 3px solid var(--glass-border-hover);
      box-shadow: 0 0 20px rgba(168,85,247,.4);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(1.12); }
    }

    /* Track Info */
    .track-info {
      text-align: center;
      margin-bottom: 22px;
      padding: 0 10px;
    }

    .track-title {
      margin: 0 0 6px;
      font-size: 1.35rem;
      font-weight: 800;
      color: var(--fg);
      text-shadow: 0 2px 4px rgba(0,0,0,.3);
      letter-spacing: -0.3px;
    }

    .track-artist {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 400;
      opacity: 0.9;
    }

    .track-artist::before { content: '• '; color: #f0abfc; }

    /* Progress Bar */
    .progress-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: var(--muted);
      font-weight: 500;
    }

    .progress-bar {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,.12);
      border-radius: 4px;
      position: relative;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.2s ease;
      outline: none;
    }

    .progress-bar:hover,
    .progress-bar:focus {
      height: 8px;
      background: rgba(255,255,255,.18);
    }

    .progress-bar:focus {
      box-shadow: 0 0 0 3px rgba(168,85,247,.4);
    }

    .progress-fill {
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: 35%;
      background: linear-gradient(90deg, var(--grad1));
      border-radius: 4px;
      transition: width 0.1s linear;
      box-shadow: 0 0 15px rgba(192,38,211,.5);
    }

    .progress-thumb {
      position: absolute;
      right: -7px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px; height: 14px;
      background: var(--fg);
      border-radius: 50%;
      opacity: 0;
      transition: all 0.2s ease;
      box-shadow: 0 3px 12px rgba(0,0,0,.4), 0 0 0 2px rgba(240,171,252,.5);
      z-index: 2;
    }

    .progress-bar:hover .progress-thumb,
    .progress-bar:focus .progress-thumb {
      opacity: 1;
      transform: translateY(-50%) scale(1.15);
    }

    /* Controls */
    .player-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-bottom: 22px;
      padding: 0 5px;
    }

    .ctrl-btn {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--glass-border);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(.25,.46,.45,.94);
      padding: 0;
      flex-shrink: 0;
    }

    .ctrl-btn svg { width: 20px; height: 20px; stroke-width: 2; }

    .ctrl-btn:hover {
      background: rgba(255,255,255,.16);
      border-color: var(--glass-border-hover);
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(168,85,247,.35);
    }

    .ctrl-btn:active { transform: translateY(-1px); }

    .ctrl-btn.primary {
      background: rgba(140,60,220,.35);
      border-color: rgba(220,150,255,.45);
    }

    .ctrl-btn.primary:hover {
      background: rgba(160,70,240,.55);
      border-color: var(--glass-border-hover);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 10px 28px rgba(192,38,211,.45);
    }

    .play-pause {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #a78bfa, #f472b6, #c026d3);
      border: 2px solid rgba(255,255,255,.3);
      box-shadow: 0 8px 32px rgba(192,38,211,.55), inset 0 1px 0 rgba(255,255,255,.2);
      transition: all 0.3s cubic-bezier(.25,.46,.45,.94);
    }

    .play-pause:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 45px rgba(192,38,211,.75), inset 0 2px 0 rgba(255,255,255,.3);
    }

    .play-pause:active { transform: scale(1.05); }
    .play-pause svg { width: 26px; height: 26px; filter: brightness(0) saturate(100%) invert(1); }

    .pause-icon { display: none; }
    .playing .play-icon { display: none; }
    .playing .pause-icon { display: block; }

    /* Volume */
    .volume-control {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 18px 10px 20px;
      border-top: 1px solid var(--glass-border);
      margin-top: 4px;
    }

    .volume-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--glass-border);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0;
      flex-shrink: 0;
    }

    .volume-btn svg { width: 19px; height: 19px; }
    .volume-btn:hover {
      background: rgba(255,255,255,.16);
      border-color: var(--glass-border-hover);
      transform: translateY(-2px);
    }

    .vol-mute { display: none; }
    .muted .vol-high { display: none; }
    .muted .vol-mute { display: block; }

    .volume-slider {
      flex: 1;
      height: 5px;
      -webkit-appearance: none;
      background: rgba(255,255,255,.12);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      transition: height 0.2s ease;
    }

    .volume-slider:hover { height: 7px; }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 15px; height: 15px;
      background: var(--fg);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px rgba(0,0,0,.35), 0 0 0 2px rgba(240,171,252,.4);
      border: 2px solid var(--bg);
    }

    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 3px 15px rgba(0,0,0,.45), 0 0 0 3px rgba(240,171,252,.6);
    }

    .volume-slider::-moz-range-thumb {
      width: 15px; height: 15px;
      background: var(--fg);
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid var(--bg);
      box-shadow: 0 2px 10px rgba(0,0,0,.35), 0 0 0 2px rgba(240,171,252,.4);
    }

    /* Playlist Toggle */
    .playlist-toggle {
      position: absolute;
      top: 18px;
      left: 18px;
      width: 38px; height: 38px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      border: 1px solid var(--glass-border);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      padding: 0;
      z-index: 10;
    }

    [dir="ltr"] .playlist-toggle { left: auto; right: 18px; }

    .playlist-toggle:hover {
      background: rgba(255,255,255,.16);
      border-color: var(--glass-border-hover);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(168,85,247,.3);
    }

    .playlist-toggle svg { width: 19px; height: 19px; }
    .playlist-toggle.active {
      background: rgba(140,60,220,.4);
      border-color: var(--glass-border-hover);
    }

    /* Playlist Panel */
    .playlist-panel {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      box-shadow: var(--glass-shadow-inset), var(--glass-shadow-outer);
      margin-top: 16px;
      max-height: 0;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(.25,.46,.45,.94);
      opacity: 0;
      transform: translateY(-10px);
      width: 100%;
      max-width: 420px;
    }

    .playlist-panel[aria-hidden="false"] {
      max-height: 420px;
      padding: 18px;
      opacity: 1;
      transform: translateY(0);
    }

    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--glass-border);
      margin-bottom: 14px;
    }

    .playlist-header h4 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--fg);
    }

    .playlist-header h4::before { content: '🎵 '; }

    .playlist-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.6rem;
      font-weight: 300;
      cursor: pointer;
      padding: 0 6px;
      transition: all 0.2s ease;
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .playlist-close:hover {
      color: var(--fg);
      background: rgba(255,255,255,.1);
    }

    .playlist-items {
      list-style: none;
      margin: 0; padding: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 290px;
      overflow-y: auto;
      padding-right: 4px;
    }

    [dir="ltr"] .playlist-items { padding-right: 0; padding-left: 4px; }

    .playlist-items::-webkit-scrollbar { width: 5px; }
    .playlist-items::-webkit-scrollbar-track { background: transparent; }
    .playlist-items::-webkit-scrollbar-thumb {
      background: rgba(240,171,252,.35);
      border-radius: 3px;
      transition: background 0.2s ease;
    }
    .playlist-items::-webkit-scrollbar-thumb:hover {
      background: rgba(240,171,252,.55);
    }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
    }

    .playlist-item::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(135deg, transparent, rgba(240,171,252,.08), transparent);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .playlist-item:hover { background: rgba(255,255,255,.06); }
    .playlist-item:hover::before { opacity: 1; }

    .playlist-item.active {
      background: linear-gradient(135deg, rgba(140,60,220,.25), rgba(192,38,211,.15));
      border: 1px solid rgba(220,150,255,.35);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15), 0 4px 20px rgba(140,60,220,.2);
    }

    .playlist-item.active::after {
      content: '▶';
      position: absolute;
      left: 12px;
      color: #f0abfc;
      font-size: 0.7rem;
      animation: bounce 1s ease infinite;
    }

    [dir="ltr"] .playlist-item.active::after { left: auto; right: 12px; }

    @keyframes bounce {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(3px); }
    }

    .track-num {
      width: 26px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      flex-shrink: 0;
    }

    .playlist-item.active .track-num {
      color: #f0abfc;
      text-shadow: 0 0 10px rgba(240,171,252,.5);
    }

    .playlist-track { flex: 1; min-width: 0; }

    .pt-title {
      display: block;
      font-weight: 700;
      font-size: 0.98rem;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }

    .playlist-item.active .pt-title { color: #fff; }

    .pt-artist {
      display: block;
      font-size: 0.82rem;
      color: var(--muted);
      opacity: 0.85;
    }

    .pt-duration {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 500;
      flex-shrink: 0;
      background: rgba(255,255,255,.06);
      padding: 4px 10px;
      border-radius: 20px;
    }

    .playlist-item.active .pt-duration {
      background: rgba(240,171,252,.15);
      color: #f0abfc;
    }

    /* Equalizer */
    .equalizer {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 16px;
      margin-left: 8px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    [dir="ltr"] .equalizer { margin-left: 0; margin-right: 8px; }
    .playing .equalizer { opacity: 1; }

    .eq-bar {
      width: 3px;
      background: linear-gradient(to top, #a78bfa, #f472b6);
      border-radius: 2px;
      animation: eqPulse 0.6s ease-in-out infinite alternate;
    }

    .eq-bar:nth-child(2) { animation-delay: -0.4s; }
    .eq-bar:nth-child(3) { animation-delay: -0.2s; }
    .eq-bar:nth-child(4) { animation-delay: -0.1s; }

    @keyframes eqPulse {
      from { height: 4px; opacity: 0.6; }

          artist: "Haarper",

          src: "https://github.com/GoldenJDM/GoldenJDM-website/raw/refs/heads/main/musics/Haarper%20%20%20@AHANG_SiSTEM%20-%20The%20Alchemist.mp3",

        },
        {

          src: "https://github.com/GoldenJDM/GoldenJDM-website/raw/refs/heads/main/musics/The%20Silence.mp3",
          duration: "4:15"
        },
        {
          title: "Tokyo Revengers",
          artist: "Mupp",
          cover: "https://i.postimg.cc/KjZfGfGJ/Tokyo-Revengers.jpg",
          src: "https://github.com/GoldenJDM/GoldenJDM-website/raw/refs/heads/main/musics/Mupp%20%20%20@AHANG_SiSTEM%20-%20Tokyo%20Revengers.mp3",
          duration: "3:25"
        },
        {
          title: "Yakuza",
          artist: "Free Flow Flava",
          cover: "https://i.postimg.cc/y6PnfMnd/Yakuza.jpg",
          src: "https://github.com/GoldenJDM/GoldenJDM-website/raw/refs/heads/main/musics/Free%20Flow%20Flava%20%20%20@AHANG_SiSTEM%20-%20Yakuza.mp3",
          duration: "3:38"
        },
        {
          title: "You Ain't Worth It",
          artist: "Melii & 6LACK",
          cover: "https://i.postimg.cc/kgky6qMF/You-Aint-Worth-It.jpg",
          src: "https://github.com/GoldenJDM/GoldenJDM-website/raw/refs/heads/main/musics/01%20You%20Ain't%20Worth%20It.m4a",
          duration: "3:48"
        }
      ];

      // === ELEMENTS ===
      const player = document.getElementById('musicPlayer');
      const audio = document.getElementById('audioPlayer');
      const playBtn = document.getElementById('playBtn');
      const progressBar = document.getElementById('progressBar');
      const progressFill = document.getElementById('progressFill');
      const currentTimeEl = document.getElementById('currentTime');
      const durationEl = document.getElementById('duration');
      const volumeSlider = document.getElementById('volumeSlider');
      const volumeBtn = document.getElementById('volumeBtn');
      const playlistToggle = document.getElementById('playlistToggle');
      const playlistPanel = document.getElementById('playlistPanel');
      const playlistClose = playlistPanel.querySelector('.playlist-close');
      const playlistItems = document.getElementById('playlistItems');
      const trackTitle = document.getElementById('trackTitle');
      const trackArtist = document.getElementById('trackArtist');
      const artworkImage = document.getElementById('artworkImage');
      const shuffleBtn = document.getElementById('shuffleBtn');
      const repeatBtn = document.getElementById('repeatBtn');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      // === STATE ===
      let currentTrackIndex = 0;
      let isPlaying = false;
      let isMuted = false;
      let isShuffle = false;
      let repeatMode = 0; // 0: off, 1: all, 2: one
      let animationFrame = null;

      // === BACKGROUND PARTICLES ===
      function createParticles() {
        const container = document.querySelector('.bg-particles');
        for (let i = 0; i < 20; i++) {
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = Math.random() * 100 + '%';
          p.style.animationDelay = Math.random() * 15 + 's';
          p.style.animationDuration = (15 + Math.random() * 10) + 's';
          container.appendChild(p);
        }
      }
      createParticles();

      // === FORMAT TIME ===
      function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
      }

      // === RENDER PLAYLIST ===
      function renderPlaylist() {
        playlistItems.innerHTML = tracks.map((track, i) => `
          <li class="playlist-item ${i===0?'active':''}" data-index="${i}">
            <span class="track-num">${i+1}</span>
            <div class="playlist-track">
              <span class="pt-title">${track.title}</span>
              <span class="pt-artist">${track.artist}</span>
            </div>
            <span class="pt-duration">${track.duration}</span>
          </li>
        `).join('');
      }

      // === LOAD TRACK ===
      function loadTrack(index) {
        const track = tracks[index];
        currentTrackIndex = index;
        
        // Update UI
        trackTitle.textContent = track.title;
        trackArtist.textContent = track.artist;
        artworkImage.src = track.cover;
        artworkImage.alt = `کاور آهنگ ${track.title}`;
        durationEl.textContent = track.duration;
        
        // Update playlist active state
        document.querySelectorAll('.playlist-item').forEach((item, i) => {
          item.classList.toggle('active', i === index);
        });
        
        // Load audio
        audio.src = track.src;
        audio.load();
        
        // Reset progress
        progressFill.style.width = '0%';
        currentTimeEl.textContent = '0:00';
        progressBar.setAttribute('aria-valuenow', '0');
      }

      // === PLAY/PAUSE ===
      function togglePlay() {
        if (audio.paused) {
          audio.play().then(() => {
            isPlaying = true;
            player.classList.add('playing');
            animateProgress();
          }).catch(e => console.log('Playback error:', e));
        } else {
          audio.pause();
          isPlaying = false;
          player.classList.remove('playing');
          if (animationFrame) cancelAnimationFrame(animationFrame);
        }
      }
      playBtn.addEventListener('click', togglePlay);

      // === PROGRESS ===
      function updateProgress() {
        if (audio.duration) {
          const percent = (audio.currentTime / audio.duration) * 100;
          progressFill.style.width = percent + '%';
          currentTimeEl.textContent = formatTime(audio.currentTime);
          progressBar.setAttribute('aria-valuenow', Math.round(percent));
        }
        if (isPlaying) {
          animationFrame = requestAnimationFrame(updateProgress);
        }
      }

      function animateProgress() {
        if (!isPlaying) return;
        updateProgress();
        animationFrame = requestAnimationFrame(animateProgress);
      }

      progressBar.addEventListener('click', (e) => {
        const rect = progressBar.getBoundingClientRect();
        const percent = (e.clientX - rect.left) / rect.width;
        if (audio.duration) {
          audio.currentTime = percent * audio.duration;
          updateProgress();
        }
      });

      progressBar.addEventListener('keydown', (e) => {
        if (!audio.duration) return;
        if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
          e.preventDefault();
          audio.currentTime = Math.min(audio.duration, audio.currentTime + 5);
          updateProgress();
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
          e.preventDefault();
          audio.currentTime = Math.max(0, audio.currentTime - 5);
          updateProgress();
        } else if (e.key === ' ') {
          e.preventDefault();
          togglePlay();
        }
      });

      // === VOLUME ===
      function updateVolumeIcon() {
        const v = audio.volume;
        volumeBtn.classList.toggle('muted', v === 0 || isMuted);
      }

      volumeSlider.addEventListener('input', (e) => {
        audio.volume = e.target.value / 100;
        isMuted = (audio.volume === 0);
        updateVolumeIcon();
      });

      volumeBtn.addEventListener('click', () => {
        if (isMuted || audio.volume === 0) {
          audio.volume = 0.8;
          volumeSlider.value = 80;
          isMuted = false;
        } else {
          audio.volume = 0;
          volumeSlider.value = 0;
          isMuted = true;
        }
        updateVolumeIcon();
      });

      // === PLAYLIST TOGGLE ===
      function togglePlaylist() {
        const hidden = playlistPanel.getAttribute('aria-hidden') === 'true';
        playlistPanel.setAttribute('aria-hidden', !hidden);
        playlistToggle.classList.toggle('active', hidden);
      }
      playlistToggle.addEventListener('click', togglePlaylist);
      playlistClose.addEventListener('click', () => {
        playlistPanel.setAttribute('aria-hidden', 'true');
        playlistToggle.classList.remove('active');
      });

      // === SELECT TRACK FROM PLAYLIST ===
      playlistItems.addEventListener('click', (e) => {
        const item = e.target.closest('.playlist-item');
        if (item) {
          const index = parseInt(item.dataset.index);
          loadTrack(index);
          if (!isPlaying) togglePlay();
        }
      });

      // === CONTROL BUTTONS ===
      shuffleBtn.addEventListener('click', () => {
        isShuffle = !isShuffle;
        shuffleBtn.style.borderColor = isShuffle ? 'var(--glass-border-hover)' : '';
        shuffleBtn.style.boxShadow = isShuffle ? '0 0 15px rgba(168,85,247,.4)' : '';
      });

      repeatBtn.addEventListener('click', () => {
        repeatMode = (repeatMode + 1) % 3;
        const colors = ['', 'var(--glass-border-hover)', '#f0abfc'];
        const shadows = ['', '0 0 15px rgba(168,85,247,.4)', '0 0 20px rgba(240,171,252,.6)'];
        repeatBtn.style.borderColor = colors[repeatMode];
        repeatBtn.style.boxShadow = shadows[repeatMode];
      });

      function playNext() {
        let nextIndex;
        if (isShuffle) {
          nextIndex = Math.floor(Math.random() * tracks.length);
        } else {
          nextIndex = (currentTrackIndex + 1) % tracks.length;
        }
        loadTrack(nextIndex);
        if (isPlaying) audio.play();
      }

      function playPrev() {
        if (audio.currentTime > 3) {
          audio.currentTime = 0;
        } else {
          const prevIndex = (currentTrackIndex - 1 + tracks.length) % tracks.length;
          loadTrack(prevIndex);
          if (isPlaying) audio.play();
        }
      }

      prevBtn.addEventListener('click', playPrev);
      nextBtn.addEventListener('click', playNext);

      // === AUDIO EVENTS ===
      audio.addEventListener('ended', () => {
        if (repeatMode === 2) {
          audio.currentTime = 0;
          if (isPlaying) audio.play();
        } else if (repeatMode === 1 || isShuffle) {
          playNext();
        } else {
          isPlaying = false;
          player.classList.remove('playing');
          progressFill.style.width = '100%';
          if (animationFrame) cancelAnimationFrame(animationFrame);
        }
      });

      audio.addEventListener('loadedmetadata', () => {
        durationEl.textContent = formatTime(audio.duration);
      });

      // === KEYBOARD SHORTCUTS ===
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        
        switch(e.key.toLowerCase()) {
          case ' ':
          case 'k':
            e.preventDefault();
            togglePlay();
            break;
          case 'arrowright':
          case 'l':
            e.preventDefault();
            if (audio.duration) {
              audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
              updateProgress();
            }
            break;
          case 'arrowleft':
          case 'j':
            e.preventDefault();
            if (audio.duration) {
              audio.currentTime = Math.max(0, audio.currentTime - 10);
              updateProgress();
            }
            break;
          case 'arrowup':
            e.preventDefault();
            audio.volume = Math.min(1, audio.volume + 0.1);
            volumeSlider.value = audio.volume * 100;
            updateVolumeIcon();
            break;
          case 'arrowdown':
            e.preventDefault();
            audio.volume = Math.max(0, audio.volume - 0.1);
            volumeSlider.value = audio.volume * 100;
            updateVolumeIcon();
            break;
          case 'm':
            e.preventDefault();
            volumeBtn.click();
            break;
          case 'n':
            e.preventDefault();
            playNext();
            break;
          case 'p':
            e.preventDefault();
            playPrev();
            break;
        }
      });

      // === INIT ===
      renderPlaylist();
      loadTrack(0);
      audio.volume = 0.8;
      updateVolumeIcon();

      // === CLEANUP ===
      window.addEventListener('beforeunload', () => {
        if (animationFrame) cancelAnimationFrame(animationFrame);
        audio.pause();
      });

    })();
  </script>
